# ============================================================
# Docker Compose — Production (Pull from Docker Hub)
# ============================================================
# ⚠️ IMPORTANT: Create a .env file with strong passwords before deploying!
# See .env.example for required variables.
# ============================================================
name: amlo

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: amlo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: backend_amlo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD_is_required_set_it_in_.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (pull from Docker Hub) ──
  backend:
    image: pongphanu/amlo-backend:latest
    container_name: amlo-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/backend_amlo
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET_is_required_generate_with_openssl_rand_-base64_48}
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY_is_required}
      SMTP_HOST: ${SMTP_HOST:-smtp.ethereal.email}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      NODE_ENV: production
      PORT: 8080
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    ports:
      - '8080:8080'
      - '5555:5555'

  # ── Frontend (pull from Docker Hub) ──
  frontend:
    image: pongphanu/amlo-frontend:latest
    container_name: amlo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  postgres_data:
    name: amlo_postgres_data
  uploads:
    name: amlo_uploads
  backups:
    name: amlo_backups
